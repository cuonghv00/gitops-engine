{{/*
  _pvc.yaml
  Standard PVC template for stateful applications.
*/}}
{{- define "common-lib.pvc" -}}
{{- if .Values.pvc -}}
{{- if and .Values.pvc.enabled (not .Values.pvc.existingClaim) -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "common-lib.fullname" . }}
  labels:
    {{- include "common-lib.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.pvc.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.pvc.size | quote }}
  {{- /* HELM-03 FIX: Use 'hasKey' not a falsy check.
       storageClass: ""  (empty string) = "bind to PV with no StorageClass" — a valid K8s semantic.
       The original 'if .Values.pvc.storageClass' would silently drop it (empty string is falsy in Go templates).
       This mirrors the LOGIC-1 fix in generator.py that uses 'is not None' not truthiness. */}}
  {{- if hasKey .Values.pvc "storageClass" }}
  storageClassName: {{ .Values.pvc.storageClass | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
