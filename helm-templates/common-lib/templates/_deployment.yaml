{{/*
================================================================================
  common-lib/_deployment.yaml
  Reusable template that renders a Kubernetes Deployment resource.
  Invoked by main.yaml when .Values.type == "deployment".
  Pod spec is delegated to the shared "common-lib.podSpec" partial.
================================================================================
*/}}
{{- define "common-lib.deployment" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common-lib.fullname" . }}
  labels:
    {{- include "common-lib.labels" . | nindent 4 }}
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- /* HELM-01 FIX: Use 'hasKey' instead of a falsy check.
       'if .Values.deployment.replicas' would silently drop 'replicas: 0' (suspend a deployment).
       HPA mode: generator omits this key entirely → hasKey returns false → correct, no replicas field.
       Static mode: generator sets it to N → hasKey returns true → rendered correctly. */}}
  {{- if hasKey .Values.deployment "replicas" }}
  replicas: {{ .Values.deployment.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "common-lib.selectorLabels" . | nindent 6 }}
  strategy:
    {{- toYaml (.Values.deployment.strategy | default (dict "type" "RollingUpdate")) | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "common-lib.selectorLabels" . | nindent 8 }}
        {{- with .Values.deployment.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.deployment.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "common-lib.podSpec" . | nindent 6 }}
  {{- with .Values.deployment.k8sDeployment }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
