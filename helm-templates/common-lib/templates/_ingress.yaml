{{/*
================================================================================
  common-lib/_ingress.yaml
  Reusable template that renders a Kubernetes Ingress resource.

  Key behaviors:
  - Nginx default annotations are injected and merged with user overrides
    by the generator (not hardcoded here) — this allows per-app full override.
  - Per-path servicePort supports both integers ('number') and strings ('name').
  - TLS is rendered only when .Values.ingress.tls is defined.
================================================================================
*/}}
{{- define "common-lib.ingress" -}}
{{- $fullName := include "common-lib.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "common-lib.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  {{- /*
                    Detect port type:
                    - Integer (float64 in Go templates) → render as 'number'
                    - String (port name like "http")    → render as 'name'
                  */}}
                  {{- if kindIs "float64" .servicePort }}
                  number: {{ .servicePort | int }}
                  {{- else }}
                  name: {{ .servicePort | quote }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
