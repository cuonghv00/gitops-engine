# projects/ops-team/phoenix-project/phoenix-project-dev.yaml
# ==============================================================================
# Reference Project: E-commerce Platform
# Uses the Modernized GitOps Engine Schema (Flattened Envs & Volumes)
# ==============================================================================

project: "phoenix-project"
common_version: "1.0.0"
image_repo: "registry.vn/phoenix-project"
image_tag: "latest"

# ------------------------------------------------------------------------------
# Project-level PVCs (Lifecycle independent from apps)
# ------------------------------------------------------------------------------
pvcs:
  - name: "redis-data"
    size: "10Gi"
    storageClass: "standard"

apps:
  # ----------------------------------------------------------------------------
  # EXAMPLE 1: Minimal Service (Simple)
  # Just name and port. Good for internal tools or auxiliary services.
  # ----------------------------------------------------------------------------
  - name: "minimal-service"
    port: 8080

  # ----------------------------------------------------------------------------
  # EXAMPLE 2: API Gateway (Intermediate)
  # Demonstrates Ingress, basic Health Checks, and Resource Limits.
  # ----------------------------------------------------------------------------
  - name: api-gateway
    image: registry.vn/phoenix-project/api-gateway
    port: 8080
    replicas: 2
    initContainers:
      - name: init-db
        image: busybox:1.36
        command: ["sh", "-c", "echo waiting for db; sleep 1"]
    sidecars:
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.1.0
        args:
          - "--port=5432"
          - "project:region:instance"
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    ingress:
      enabled: true
      host: "api.example.com"
      path: "/"
    health:
      enabled: true      # Uses default HTTP check on '/'
      startup:
        path: "/health"
        failureThreshold: 30 # Allow 30 * 10s = 5 mins for slow startup
        periodSeconds: 10
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300

  # ----------------------------------------------------------------------------
  # EXAMPLE 3: User Service (Advanced)
  # Demonstrates flattened envs with mixed sources (plain + secretKeyRef).
  # ----------------------------------------------------------------------------
  - name: "user-service"
    image_tag: "v1.2.3"  # Overrides global image_tag
    port: 3000           # Container port
    service:
      port: 80           # Service port (80) maps to Container port (3000)
    
    envs:
      - name: LOG_LEVEL
        value: "debug"
      - secretEnv: phoenix-project-secret
        vars:
          - DATABASE_URL     # From shared variables.env
          - DB_PASSWORD      # From Vault
          - AUTH_SECRET      # From Vault

  # ----------------------------------------------------------------------------
  # EXAMPLE 4: Redis Proxy (Stateful/Storage)
  # Demonstrates flattened volumes referencing a ProjectPVC.
  # ----------------------------------------------------------------------------
  - name: "redis-proxy"
    port: 6379
    health:
      enabled: true
      # No 'path' provided -> generator.py auto-sets tcpSocket check
    
    volumes:
      - name: redis-storage
        mountPath: /data
        pvc: redis-data

  # ----------------------------------------------------------------------------
  # EXAMPLE 5: Order Service (Multi-Port & RBAC Security)
  # Demonstrates multi-port and strict RBAC schema.
  # ----------------------------------------------------------------------------
  - name: "order-service"
    type: "deployment"
    replicas: 1
    ports:
      - name: "http"
        port: 80
        targetPort: 8080
      - name: "grpc"
        port: 50051
        targetPort: 50051
    
    serviceAccount:
      create: true           # Creates order-service-sa
      automountToken: false  # Maximum Security
    
    ingress:
      enabled: true
      host: "orders.phoenix-project.vn"
      servicePort: "http"    # Reference port by name
    
    health:
      enabled: true
      liveness:
        grpc:
          port: 50051

  # ----------------------------------------------------------------------------
  # EXAMPLE 6: Database Migration (Job)
  # Demonstrates: type=job, batch config, command override.
  # Runs once: executes DB migrations then terminates.
  # ----------------------------------------------------------------------------
  - name: db-migrate
    type: job
    image: registry.vn/phoenix-project/migrator:v1.2.0
    command: ["/app/migrate", "--env=dev", "--run"]
    resources:
      limits:
        cpu: "500m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    job:
      backoffLimit: 3
      ttlSecondsAfterFinished: 600   # Cleanup pods after 10 minutes
      restartPolicy: OnFailure
      completionMode: Indexed        # New generic Job field allowed by extra='allow'
      suspend: true                  # New generic Job field allowed by extra='allow'

  # ----------------------------------------------------------------------------
  # EXAMPLE 7: Database Backup (CronJob)
  # Demonstrates: type=cronjob, schedule, concurrencyPolicy, job config.
  # Runs every day at 2 AM, forbids concurrent runs.
  # ----------------------------------------------------------------------------
  - name: backup-db
    type: cronjob
    image: registry.vn/phoenix-project/backup:v1.0.0
    command: /backup.sh              # String command unpacked automatically by the new feature!
    resources:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"
    cronjob:
      schedule: "0 2 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 1
    job:
      backoffLimit: 2
      activeDeadlineSeconds: 3600    # Abort if still running after 1 hour
      ttlSecondsAfterFinished: 86400 # Cleanup after 24 hours

  # ----------------------------------------------------------------------------
  # EXAMPLE 8: Feature Test (K8s Escape Hatch & secretEnv logic)
  # Demonstrates direct native K8s overrides and full secret injection
  # ----------------------------------------------------------------------------
  - name: test-escape-hatch
    image: alpine:latest
    port: 8080
    envs:
      - secretEnv: phoenix-project-secret  # Loads entire secret via envFrom since 'vars' is omitted!
    k8s:
      pod:
        hostAliases:
          - ip: "10.0.0.99"
            hostnames:
              - "internal-svc.local"
      mainContainer:
        command: sh -c "echo OVERRIDDEN BY K8S ESCAPE && sleep 3600"
      deployment:
        strategy:
          type: Recreate
