type: deployment
image:
  repository: registry.vn/test/normal-app
  tag: null
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  containerPort: 8080
  resources: {}
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  imagePullSecrets:
  - name: regcred
  envFrom:
  - configMapRef:
      name: multi-apps-test-config
  env:
  - name: DATABASE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: multi-apps-test-secret
        key: DATABASE_PASSWORD
  volumes:
  - name: tmp
    emptyDir: {}
  - name: env-file
    configMap:
      name: multi-apps-test-config
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: env-file
    mountPath: /app/.env
    subPath: .env
  affinity: {}
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    httpGet:
      path: /healthz
      port: 8080
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    httpGet:
      path: /healthz
      port: 8080
serviceAccount:
  create: false
  name: default
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
ingress:
  enabled: true
  hosts:
  - host: normal.example.com
    paths:
    - path: /
      pathType: ImplementationSpecific
      servicePort: 8080
localConfig:
  enabled: false
