# examples/apps.example.yaml
# ==============================================================================
# Comprehensive Application Definition Example
# Use this as a template for your project configuration.
#
# 3-layer config model:
#   Lớp 1 — Shorthand (80% use-cases): port, health, resources, envs, volumes, ingress, hpa
#   Lớp 2 — Config objects (15% use-cases): service, strategy, job, cronjob
#   Lớp 3 — Native escape hatch (5% use-cases): k8s.pod, k8s.deployment, k8s.mainContainer
# ==============================================================================

project: "example-project"
common_version: "1.0.0"
image_repo: "registry.vn/example"
image_tag: "v1.0.0"

imagePullSecrets:
  - name: "regcred-global"

# ------------------------------------------------------------------------------
# Project-level PVCs — lifecycle managed INDEPENDENTLY from app charts.
# Reference them in app volumes via `pvc: <name>`.
# ------------------------------------------------------------------------------
pvcs:
  - name: "shared-storage"
    size: "50Gi"
    storageClass: "nfs-client"
    accessModes:
      - ReadWriteMany

  - name: "db-data"
    size: "20Gi"
    storageClass: "fast-ssd"

apps:
  # ----------------------------------------------------------------------------
  # CASE 1: Simple Web Service — Lớp 1 only, minimal config
  # ----------------------------------------------------------------------------
  - name: "web-portal"
    port: 80
    replicas: 2
    ingress:
      enabled: true
      host: "portal.example.com"
    health:
      enabled: true
    resources:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "50m"
        memory: "64Mi"

  # ----------------------------------------------------------------------------
  # CASE 2: All Env Declaration Styles
  # ----------------------------------------------------------------------------
  - name: "backend-api"
    port: 3000
    service:
      port: 80           # Service port 80 → container port 3000

    envs:
      # Style 1: Plain key-value
      - name: LOG_LEVEL
        value: "debug"

      # Style 2: Per-key secretKeyRef (Vault-synced secret → K8s Secret)
      - secretEnv: example-project-secret
        vars:
          - DATABASE_URL
          - API_KEY

      # Style 3: Inject ALL keys from a secret (envFrom — omit vars)
      - secretEnv: shared-credentials

      # Style 4: Inject all keys from a ConfigMap via envFrom
      - configMap: global-feature-flags

      # Style 5: Inject all keys from a Secret via envFrom
      - secret: external-api-keys

      # Style 6: Downward API — Pod metadata & resource fields
      - name: POD_IP
        valueFrom:
          fieldRef:
            fieldPath: status.podIP

      - name: POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name

      - name: CPU_REQUEST
        valueFrom:
          resourceFieldRef:
            containerName: backend-api
            resource: requests.cpu

    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  # ----------------------------------------------------------------------------
  # CASE 3: All Volume Source Types + Mount Options
  # ----------------------------------------------------------------------------
  - name: "data-processor"
    port: 8080

    volumes:
      # PVC reference (must be declared in project pvcs: above)
      - name: shared-data
        mountPath: /mnt/shared
        pvc: shared-storage
        readOnly: true
        mountPropagation: None

      # Read-write PVC
      - name: db-storage
        mountPath: /var/lib/db
        pvc: db-data

      # EmptyDir (in-memory ramdisk)
      - name: memory-cache
        mountPath: /tmp/cache
        emptyDir:
          medium: Memory
          sizeLimit: "256Mi"

      # EmptyDir (default disk-backed)
      - name: work-dir
        mountPath: /tmp/work
        emptyDir: {}

      # HostPath — access node filesystem
      - name: host-logs
        mountPath: /var/log/app
        hostPath:
          path: /var/log/nodes
          type: DirectoryOrCreate

      # ConfigMap mounted as directory of files
      - name: app-config
        mountPath: /etc/config
        configMap:
          name: special-config
          items:
            - key: settings.json
              path: settings.json

      # ConfigMap shorthand (mount entire CM as directory)
      - name: nginx-conf
        mountPath: /etc/nginx/conf.d
        configMap: nginx-config

      # Secret mounted as files (TLS certs, SSH keys)
      - name: tls-certs
        mountPath: /etc/ssl/certs
        readOnly: true
        secret:
          secretName: tls-cert
          items:
            - key: tls.crt
              path: tls.crt
            - key: tls.key
              path: tls.key

      # Secret shorthand
      - name: api-token
        mountPath: /run/secrets/token
        secret: api-token-secret

      # NFS — network filesystem shorthand (Lớp 2)
      - name: nfs-archive
        mountPath: /mnt/archive
        readOnly: true
        nfs:
          server: nfs.example.com
          path: /exports/archive

      # CSI — external storage driver (e.g. Secrets Store CSI)
      - name: vault-secrets
        mountPath: /mnt/secrets
        readOnly: true
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: vault-provider

      # Projected — combine multiple sources into one volume
      - name: combined-auth
        mountPath: /var/auth
        projected:
          sources:
            - secret:
                name: db-credentials
            - configMap:
                name: app-config

  # ----------------------------------------------------------------------------
  # CASE 4: Stateful Service (legacy pvc field — still works for simple cases)
  # ----------------------------------------------------------------------------
  - name: "redis-cache"
    port: 6379
    health:
      enabled: true
    pvc:
      enabled: true
      size: "20Gi"
      storageClass: "fast-storage"
      mountPath: "/data"
    securityContext:
      runAsUser: 999
      readOnlyRootFilesystem: false

  # ----------------------------------------------------------------------------
  # CASE 5: Multi-Port Service with RBAC + combined env sources
  # ----------------------------------------------------------------------------
  - name: "order-service"
    ports:
      - name: http
        port: 80
        targetPort: 8080
      - name: grpc
        port: 50051
        targetPort: 50051
    serviceAccount:
      create: true
      automountToken: false

    envs:
      - name: ENV
        value: "production"
      - secretEnv: order-service-secret
        vars:
          - DB_PASSWORD
          - STRIPE_SECRET
      - configMap: global-config

    ingress:
      enabled: true
      host: "orders.example.com"
      servicePort: "http"
    health:
      enabled: true
      liveness: "/health"
      readiness: "/ready"

  # ----------------------------------------------------------------------------
  # CASE 6: Advanced Ingress — Multiple hosts/paths + annotations
  # ----------------------------------------------------------------------------
  - name: "admin-panel"
    port: 3000
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      hosts:
        - host: "admin.example.com"
          paths:
            - path: "/internal"
              pathType: "Prefix"
            - path: "/static"
              pathType: "ImplementationSpecific"

  # ----------------------------------------------------------------------------
  # CASE 7: Lớp 2 — Strategy object + nodeSelector + podLabels
  # ----------------------------------------------------------------------------
  - name: "worker-service"
    port: 8080
    replicas: 3

    # Lớp 2: Full strategy object with rolling update tuning
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 2
        maxUnavailable: 0

    # Node affinity shorthand
    nodeSelector:
      node-type: compute
      kubernetes.io/os: linux

    # Extra labels injected into Pod metadata (for monitoring, cost allocation, etc.)
    podLabels:
      team: platform
      tier: backend
      cost-center: "engineering"

    resources:
      limits:
        cpu: "1000m"
        memory: "1Gi"
      requests:
        cpu: "200m"
        memory: "256Mi"

  # ----------------------------------------------------------------------------
  # CASE 8: Lớp 3 — Native K8s Escape Hatch (k8s:)
  # ----------------------------------------------------------------------------
  - name: "legacy-bridge"
    image: alpine:latest
    port: 8080

    envs:
      - secretEnv: legacy-secret   # All keys loaded via envFrom (no vars)

    # k8s: — deep-merge overrides at each spec level
    k8s:
      pod:
        # Pod-level overrides — hostAliases, dnsPolicy, dnsConfig, etc.
        hostAliases:
          - ip: "10.0.0.99"
            hostnames:
              - "internal-svc.local"
              - "legacy-api.local"
        dnsPolicy: "None"
        dnsConfig:
          nameservers:
            - "10.0.0.10"
          searches:
            - "svc.cluster.local"

      mainContainer:
        # Container-level overrides — lifecycle hooks, stdin, etc.
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]

      deployment:
        # Deployment spec overrides — minReadySeconds, progressDeadlineSeconds, etc.
        minReadySeconds: 10
        progressDeadlineSeconds: 300

  # ----------------------------------------------------------------------------
  # CASE 9: Full Job Options Support + k8s.job escape hatch
  # ----------------------------------------------------------------------------
  - name: "db-migrate"
    type: job
    image: my-migrator:v2.1.0
    command: "/app/migrate --env prod --run"   # String parsed into array via shlex

    job:
      backoffLimit: 3
      ttlSecondsAfterFinished: 600
      restartPolicy: OnFailure
      activeDeadlineSeconds: 1800
      # Any K8s Job standard parameters are allowed (extra='allow')
      completionMode: Indexed
      completions: 5
      parallelism: 2

    # k8s.job — escape hatch for advanced Job specs not in JobConfig
    k8s:
      job:
        podFailurePolicy:
          rules:
            - action: FailJob
              onExitCodes:
                operator: In
                values: [42]

  # ----------------------------------------------------------------------------
  # CASE 10: CronJob with Full Options + k8s.cronjob escape hatch
  # ----------------------------------------------------------------------------
  - name: "nightly-report"
    type: cronjob
    image: reporter:v1.0.0

    cronjob:
      schedule: "0 2 * * *"
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 5
      failedJobsHistoryLimit: 3
      startingDeadlineSeconds: 300

    job:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      restartPolicy: Never

    # k8s.cronjob — escape hatch for CronJob-specific advanced fields
    k8s:
      cronjob:
        timeZone: "Asia/Ho_Chi_Minh"   # K8s 1.27+ chrono timezone support
